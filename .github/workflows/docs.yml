name: Generate Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: curl, json

      - name: Install phpDocumentor
        run: |
          curl -L https://github.com/phpDocumentor/phpDocumentor/releases/latest/download/phpDocumentor.phar -o phpDocumentor.phar
          chmod +x phpDocumentor.phar

      - name: Generate Documentation
        run: php phpDocumentor.phar run -c phpdoc.xml

      - name: Inject dark theme into generated docs
        run: |
          REPO_NAME=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2)
          find docs -name "*.html" -exec sed -i \
            "s|</head>|<link rel=\"stylesheet\" href=\"/${REPO_NAME}/css/dark.css\"><script src=\"/${REPO_NAME}/js/theme.js\" defer></script></head>|" {} \;

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
