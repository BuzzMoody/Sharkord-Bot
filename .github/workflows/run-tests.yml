name: Run Tests

# Trigger this workflow on every push and PR to main and dev
on:
  push:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up the PHP 8.5 environment with specific extensions
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pcntl, bcmath
          coverage: none # Disable coverage generation for faster test execution

      # 3. Cache Composer dependencies to speed up future runs
      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.5-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.5-

      # 4. Install dependencies (including PHPUnit)
      - name: Install Dependencies
        if: steps.composer-cache.outputs.cache-hit != 'true'
        run: composer install --prefer-dist --no-progress --no-suggest --optimize-autoloader

      # 5. Run the test suite
      - name: Run PHPUnit Tests
        run: ./vendor/bin/phpunit --configuration phpunit.xml